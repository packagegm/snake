<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 30% 10%, #2b2350 0%, #171430 45%, #0d0b1e 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  #app { width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* 顶部 HUD 徽章 */
  #topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px 8px; color: #eee; flex: 0 0 auto;
  }
  .score-box {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 8px rgba(0,0,0,0.3);
    font-size: 17px;
  }
  .score-box .value { font-size: 24px; font-weight: 900; color: #4ecca3; text-shadow: 0 0 12px rgba(78,204,163,0.6); transition: transform 0.12s; }
  .score-box .value.hs { color: #ffd460; text-shadow: 0 0 12px rgba(255,212,96,0.6); }
  .score-box .value.pop { transform: scale(1.35); }
  #pauseBtn {
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    color: #eee; font-size: 17px; display: flex;
    align-items: center; justify-content: center;
  }

  /* 画布区域 */
  #canvasWrap { flex: 1 1 auto; position: relative; padding: 0 8px 8px; }
  canvas {
    display: block; border-radius: 16px; background: #16213e;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.09), 0 0 26px rgba(78,204,163,0.14), 0 10px 30px rgba(0,0,0,0.5);
  }

  /* 覆盖层（开始/暂停/结束） */
  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 20%, rgba(43,35,80,0.96), rgba(10,9,24,0.96));
    border-radius: 16px;
    color: #eee; text-align: center; z-index: 10;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .overlay h1 {
    font-size: 52px; font-weight: 900; letter-spacing: 8px; margin-bottom: 2px;
    color: #4ecca3;
    text-shadow: 0 0 30px rgba(78,204,163,0.4);
  }
  @supports (-webkit-background-clip: text) {
    .overlay h1 {
      background: linear-gradient(180deg, #b8ffe3, #4ecca3 55%, #1d8a67);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  }
  .sub-title { font-size: 12px; letter-spacing: 10px; color: #6f7ba0; margin-bottom: 12px; }
  .overlay h2 { font-size: 32px; font-weight: 900; margin-bottom: 10px; letter-spacing: 4px; }
  .overlay p { color: #9aa3c0; font-size: 14px; line-height: 1.8; margin-bottom: 6px; }
  .overlay .big-score {
    font-size: 58px; font-weight: 900; color: #4ecca3; margin: 4px 0;
    text-shadow: 0 0 26px rgba(78,204,163,0.55);
  }
  .overlay .new-record { color: #ffd460; font-size: 18px; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 14px rgba(255,212,96,0.5); }
  .btn {
    margin-top: 18px; padding: 15px 52px; font-size: 20px; letter-spacing: 3px;
    border: none; border-radius: 999px;
    background: linear-gradient(180deg, #62e0b6, #35b189 60%, #23906d);
    color: #06251b; font-weight: 900;
    box-shadow: 0 6px 20px rgba(78,204,163,0.45), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .btn:active { transform: scale(0.94); }
  #startBtn { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 6px 20px rgba(78,204,163,0.45), inset 0 1px 0 rgba(255,255,255,0.5); }
    50% { box-shadow: 0 6px 34px rgba(78,204,163,0.85), inset 0 1px 0 rgba(255,255,255,0.5); }
  }
  .hidden { display: none !important; }
  .legend { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 14px; font-size: 14px; color: #aaa; max-width: 92%; }
  .legend span { display: flex; align-items: center; gap: 5px; margin: 3px 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .skins { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
  .skin-chip {
    padding: 8px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.14); color: #b9c2dd; font-size: 13px;
    display: flex; align-items: center; gap: 6px; margin: 3px;
  }
  .skin-chip.sel {
    border-color: #4ecca3; color: #fff;
    background: rgba(78,204,163,0.16);
    box-shadow: 0 0 12px rgba(78,204,163,0.35);
  }
  .skin-chip.locked { opacity: 0.45; }
  .skin-title { margin-top: 16px; font-size: 13px; color: #888; }

  /* 底部方向键：左右分屏双拇指 */
  #dpad {
    flex: 0 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 14px 16px;
  }
  .dp-side { display: flex; gap: 12px; }
  .dp {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.16); color: #dfe6f7; font-size: 28px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .dp:active {
    background: rgba(78,204,163,0.25);
    border-color: rgba(78,204,163,0.7);
    transform: scale(0.92);
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="score-box"><span>🍎</span><div class="value" id="score">0</div></div>
    <div class="score-box"><span>👑</span><div class="value hs" id="highscore">0</div></div>
    <button id="pauseBtn">❚❚</button>
  </div>
  <div id="canvasWrap">
    <canvas id="game"></canvas>

    <div class="overlay" id="startScreen">
      <h1>贪吃蛇</h1>
      <div class="sub-title">S N A K E · R U S H</div>
      <p>滑动或方向键控制，撞墙或咬到自己则失败<br>吃到第2个豆子后出现对手蛇<br>咬它的蛇身可把它变成金豆，被它咬到则失败</p>
      <div class="legend">
        <span><i class="dot" style="background:#e94560"></i>豆子 +1</span>
        <span><i class="dot" style="background:#ffd460"></i>金豆子 +5</span>
        <span><i class="dot" style="background:#7f7fff"></i>减速果</span>
        <span><i class="dot" style="background:#ff9f45"></i>剪刀果 -3节</span>
        <span>🍄 变粗10s</span>
        <span>⭐ 无敌10s·穿墙·碰谁咬谁</span>
      </div>
      <div class="skin-title">皮肤（提升最高分解锁）</div>
      <div class="skins" id="skinRow"></div>
      <div class="skin-title">道具开关</div>
      <div class="skins" id="itemRow"></div>
      <div class="skin-title">对手蛇数量 / 难度</div>
      <div class="skins" id="npcCountRow"></div>
      <div class="skins" id="npcDiffRow"></div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <div class="overlay hidden" id="pauseScreen">
      <h2>已暂停</h2>
      <button class="btn" id="resumeBtn">继续</button>
    </div>

    <div class="overlay hidden" id="overScreen">
      <h2>游戏结束</h2>
      <div class="big-score" id="finalScore">0</div>
      <div class="new-record hidden" id="newRecord">🎉 新纪录！</div>
      <div class="new-record hidden" id="unlockMsg"></div>
      <p id="overBest"></p>
      <button class="btn" id="restartBtn">再来一局</button>
      <button class="btn" id="menuBtn" style="background:#16213e;border:1px solid #4ecca3;box-shadow:none;padding:10px 30px;font-size:16px">返回主界面</button>
    </div>
  </div>
  <div id="dpad">
    <div class="dp-side">
      <button class="dp" data-d="left">◀</button>
      <button class="dp" data-d="right">▶</button>
    </div>
    <div class="dp-side">
      <button class="dp" data-d="up">▲</button>
      <button class="dp" data-d="down">▼</button>
    </div>
  </div>
</div>

<script>
window.onerror = function (msg, src, line) {
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;left:0;right:0;bottom:0;background:#a00;color:#fff;font-size:12px;padding:6px;z-index:999;word-break:break-all;';
  d.textContent = '脚本错误: ' + msg + ' (行 ' + line + ')';
  document.body.appendChild(d);
};
(function () {
  'use strict';

  // ---------- 基础配置 ----------
  var COLS = 20, ROWS = 26;           // 网格尺寸
  var BASE_INTERVAL = 220;             // 初始每步毫秒
  var MIN_INTERVAL = 75;               // 最快速度
  var SPEEDUP_PER_FOOD = 4;            // 每吃一个豆子加快的毫秒数
  var GOLD_CHANCE = 0.12;              // 金豆子出现概率
  var SLOW_CHANCE = 0.08;              // 减速果出现概率
  var GOLD_LIFETIME = 6000;            // 金豆子存在时间(ms)
  var SLOW_AMOUNT = 30;                // 减速果减慢毫秒数
  var SHRINK_CHANCE = 0.08;            // 剪刀果出现概率
  var SHRINK_AMOUNT = 3;               // 剪刀果缩短节数
  var MIN_LEN = 3;                     // 蛇的最短长度
  var POWER_CHANCE = 0.10;             // 强化道具出现概率
  var POWER_DURATION = 10000;          // 强化道具持续时间(ms)
  var GOLD_DROP_LIFE = 8000;           // 对手蛇掉落金豆存在时间(ms)
  var EMOJI_FONT = 'px "Segoe UI Emoji","Noto Color Emoji",sans-serif';

  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var cell = 0, boardW = 0, boardH = 0;

  // ---------- 自适应画布 ----------
  function resize() {
    var wrap = document.getElementById('canvasWrap');
    var availW = wrap.clientWidth - 16;
    var availH = wrap.clientHeight - 8;
    cell = Math.floor(Math.min(availW / COLS, availH / ROWS));
    boardW = cell * COLS; boardH = cell * ROWS;
    var dpr = window.devicePixelRatio || 1;
    canvas.width = boardW * dpr; canvas.height = boardH * dpr;
    canvas.style.width = boardW + 'px'; canvas.style.height = boardH + 'px';
    canvas.style.margin = '0 auto';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', function () { setTimeout(resize, 100); });

  // ---------- 音频（Web Audio 合成） ----------
  var audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, vol, delay) {
    if (!audioCtx) return;
    playNote(freq, audioCtx.currentTime + (delay || 0), dur, type || 'square', vol || 0.15);
  }
  function playNote(f, t, d, type, v) {
    if (!audioCtx) return;
    try {
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(v, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + d);
    } catch (e) {}
  }
  var sfx = {
    eat:  function () { beep(660, 0.08, 'square', 0.12); beep(880, 0.10, 'square', 0.12, 0.06); },
    gold: function () { beep(880, 0.08, 'triangle', 0.18); beep(1175, 0.08, 'triangle', 0.18, 0.07); beep(1568, 0.12, 'triangle', 0.18, 0.14); },
    slow: function () { beep(500, 0.1, 'sine', 0.16); beep(350, 0.15, 'sine', 0.16, 0.09); },
    die:  function () { beep(300, 0.15, 'sawtooth', 0.18); beep(200, 0.2, 'sawtooth', 0.18, 0.12); beep(120, 0.35, 'sawtooth', 0.18, 0.26); },
    shrink: function () { beep(700, 0.05, 'square', 0.14); beep(500, 0.05, 'square', 0.14, 0.05); beep(350, 0.08, 'square', 0.14, 0.1); },
    head: function () { beep(392, 0.07, 'square', 0.15); beep(523, 0.07, 'square', 0.15, 0.06); beep(659, 0.07, 'square', 0.15, 0.12); beep(784, 0.12, 'square', 0.15, 0.18); },
    headOff: function () { beep(659, 0.06, 'triangle', 0.12); beep(440, 0.1, 'triangle', 0.12, 0.06); },
    turn: function () { beep(440, 0.03, 'square', 0.04); }
  };

  // ---------- 背景音乐：电子摇滚（鼓组+失真贝斯+强力和弦，节奏随速度加快） ----------
  var music = {on: false, next: 0, idx: 0};
  function startMusic() { music.on = true; music.next = 0; music.idx = 0; }
  function stopMusic() { music.on = false; }

  // 白噪声缓冲（军鼓/踩镲用）
  var noiseBuf = null;
  function getNoise() {
    if (!noiseBuf && audioCtx) {
      noiseBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.5), audioCtx.sampleRate);
      var d = noiseBuf.getChannelData(0);
      for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
  }
  // 失真器（贝斯/和弦过载音色）
  var shaper = null;
  function getShaper() {
    if (!shaper && audioCtx) {
      shaper = audioCtx.createWaveShaper();
      var n = 256, c = new Float32Array(n);
      for (var i = 0; i < n; i++) {
        var x = i / n * 2 - 1;
        c[i] = Math.tanh ? Math.tanh(3 * x) : (3 * x) / (1 + Math.abs(3 * x));
      }
      shaper.curve = c;
      shaper.connect(audioCtx.destination);
    }
    return shaper;
  }
  function playKick(t) {
    try {
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(140, t);
      o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
      g.gain.setValueAtTime(0.45, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.16);
    } catch (e) {}
  }
  function playHat(t, dur, freq, vol) {
    try {
      var src = audioCtx.createBufferSource(); src.buffer = getNoise();
      var f = audioCtx.createBiquadFilter(); f.type = 'bandpass';
      f.frequency.value = freq; f.Q.value = 1.2;
      var g = audioCtx.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(f); f.connect(g); g.connect(audioCtx.destination);
      src.start(t); src.stop(t + dur + 0.02);
    } catch (e) {}
  }
  function playBass(f, t, d) {
    try {
      var o1 = audioCtx.createOscillator(), o2 = audioCtx.createOscillator();
      o1.type = 'sawtooth'; o2.type = 'sawtooth';
      o1.frequency.setValueAtTime(f, t);
      o2.frequency.setValueAtTime(f * 1.007, t);
      var flt = audioCtx.createBiquadFilter(); flt.type = 'lowpass';
      flt.frequency.setValueAtTime(900, t);
      flt.frequency.exponentialRampToValueAtTime(260, t + d);
      var g = audioCtx.createGain();
      g.gain.setValueAtTime(0.14, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + d);
      o1.connect(flt); o2.connect(flt); flt.connect(g); g.connect(getShaper());
      o1.start(t); o2.start(t); o1.stop(t + d); o2.stop(t + d);
    } catch (e) {}
  }
  function playChord(f, t, d) {
    try {
      var fs = [f * 0.5, f, f * 1.498];
      for (var i = 0; i < fs.length; i++) {
        var o = audioCtx.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(fs[i] * (1 + (i - 1) * 0.004), t);
        var fl = audioCtx.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = 2200;
        var g = audioCtx.createGain();
        g.gain.setValueAtTime(0.045, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + d);
        o.connect(fl); fl.connect(g); g.connect(getShaper());
        o.start(t); o.stop(t + d);
      }
    } catch (e) {}
  }
  // E 小调摇滚 riff（16分音符 × 16步 × 4小节循环）
  var BASS_RIFF = [82.4, 0, 82.4, 98, 0, 82.4, 110, 98, 82.4, 0, 82.4, 98, 123.5, 110, 98, 73.4];
  var BAR_SHIFT = [1, 0.794, 0.891, 1];        // E → C → D → E
  var CHORDS = [164.8, 130.8, 146.8, 164.8];   // E5 C5 D5 E5
  setInterval(function () {
    if (!music.on || !audioCtx || state !== 'playing') return;
    var stp = Math.max(0.07, interval / 2000); // 16分音符时值，随蛇速加快
    while (music.next < audioCtx.currentTime + 0.3) {
      if (music.next < audioCtx.currentTime) music.next = audioCtx.currentTime;
      var t = music.next;
      var i16 = music.idx % 16;
      var bar = Math.floor(music.idx / 16) % 4;
      if (i16 % 4 === 0) playKick(t);                          // 底鼓四踩
      if (i16 === 4 || i16 === 12) playHat(t, 0.14, 1800, 0.22); // 军鼓
      playHat(t, i16 % 2 === 0 ? 0.04 : 0.03, 8500, i16 % 2 === 0 ? 0.07 : 0.035); // 踩镲
      var bf = BASS_RIFF[i16];
      if (bf) playBass(bf * BAR_SHIFT[bar], t, stp * 1.8);     // 贝斯 riff
      if (i16 === 0 || i16 === 10) playChord(CHORDS[bar], t, stp * 3); // 强力和弦
      music.next += stp;
      music.idx++;
    }
  }, 60);

  // ---------- 游戏状态 ----------
  var snake, dir, nextDir, food, golds, slow, shrink, powerItem, fxThick, fxStar;
  var enemies = [], foodCount = 0, prevSnake = null;
  var score = 0, interval = BASE_INTERVAL;
  var state = 'start'; // start | playing | paused | over
  var highscore = 0;
  try { highscore = parseInt(localStorage.getItem('snake_hs') || '0', 10) || 0; } catch (e) {}
  document.getElementById('highscore').textContent = highscore;

  // ---------- 粒子特效 ----------
  var parts = [], flash = 0, lastDraw = 0;
  var CONF = ['#e94560', '#ffd460', '#4ecca3', '#7f7fff', '#ff9f45', '#ffffff'];
  function burst(px, py, n, sp) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, v = sp * (0.4 + Math.random() * 0.8);
      parts.push({
        x: px, y: py,
        vx: Math.cos(a) * v, vy: Math.sin(a) * v - sp * 0.25,
        life: 1, dec: 0.9 + Math.random() * 0.9,
        c: CONF[Math.floor(Math.random() * CONF.length)],
        s: 2 + Math.random() * 3
      });
    }
  }
  function confettiAt(f) { burst(f.x * cell + cell / 2, f.y * cell + cell / 2, 14, cell * 4); }
  function goldBlast(g) {
    flash = 0.85;
    burst(g.x * cell + cell / 2, g.y * cell + cell / 2, 50, cell * 7);
    for (var i = 0; i < 3; i++) burst(Math.random() * boardW, Math.random() * boardH, 28, cell * 6);
  }

  // ---------- 皮肤系统 ----------
  var SKINS = [
    {name: '经典绿', need: 0,   style: 'flat',   board: '#16213e', head: '#6ee7c5', body1: [78, 204, 163],  body2: [48, 124, 103]},
    {name: '果冻3D', need: 20,  style: 'sphere', board: '#221430', head: '#ffb26b', body1: [255, 140, 66],  body2: [200, 80, 40]},
    {name: '霓虹光', need: 50,  style: 'neon',   board: '#0a0f1e', head: '#7ffbff', body1: [0, 229, 255],   body2: [180, 0, 255]},
    {name: '龙鳞甲', need: 100, style: 'scale',  board: '#0f2418', head: '#b8ffdd', body1: [46, 204, 113],  body2: [12, 100, 60]},
    {name: '黄金3D', need: 150, style: 'gold',   board: '#26200f', head: '#fff3b0', body1: [255, 215, 80],  body2: [160, 110, 20]}
  ];
  var skinIdx = 0;
  try { skinIdx = parseInt(localStorage.getItem('snake_skin') || '0', 10) || 0; } catch (e) {}
  if (!(SKINS[skinIdx] && SKINS[skinIdx].need <= highscore)) skinIdx = 0;
  function curSkin() { return SKINS[skinIdx]; }
  function lerpc(a, b, t) { return Math.round(a + (b - a) * t); }
  function renderSkins() {
    var row = document.getElementById('skinRow');
    row.innerHTML = '';
    SKINS.forEach(function (sk, i) {
      var un = sk.need <= highscore;
      var d = document.createElement('div');
      d.className = 'skin-chip' + (i === skinIdx ? ' sel' : '') + (un ? '' : ' locked');
      d.innerHTML = '<i class="dot" style="background:' + sk.head + '"></i>' + sk.name + (un ? '' : ' 🔒' + sk.need + '分');
      tap(d, function () {
        if (!un) return;
        skinIdx = i;
        try { localStorage.setItem('snake_skin', String(i)); } catch (e) {}
        renderSkins();
      });
      row.appendChild(d);
    });
  }

  // ---------- 对局设置 ----------
  var DIFFS = [
    {name: '简单', spawn: 0.2,  life: 12000, chase: 0},
    {name: '普通', spawn: 0.3,  life: 18000, chase: 0.35},
    {name: '困难', spawn: 0.45, life: 25000, chase: 0.7}
  ];
  var ITEM_DEFS = [
    {key: 'slow', label: '减速果'},
    {key: 'shrink', label: '剪刀果'},
    {key: 'thick', label: '🍄变粗'},
    {key: 'star', label: '⭐无敌'}
  ];
  var settings = {items: {slow: true, shrink: true, thick: true, star: true}, npcCount: 3, npcDiff: 1};
  try {
    var cfg = JSON.parse(localStorage.getItem('snake_cfg') || 'null');
    if (cfg && cfg.items) settings = cfg;
  } catch (e) {}
  function saveCfg() { try { localStorage.setItem('snake_cfg', JSON.stringify(settings)); } catch (e) {} }
  function chip(row, label, sel, fn) {
    var d = document.createElement('div');
    d.className = 'skin-chip' + (sel ? ' sel' : '');
    d.textContent = label;
    tap(d, fn);
    row.appendChild(d);
  }
  function renderSettings() {
    var ir = document.getElementById('itemRow');
    ir.innerHTML = '';
    ITEM_DEFS.forEach(function (it) {
      chip(ir, it.label, settings.items[it.key], function () {
        settings.items[it.key] = !settings.items[it.key];
        saveCfg(); renderSettings();
      });
    });
    var nr = document.getElementById('npcCountRow');
    nr.innerHTML = '';
    ['无对手', '1条', '2条', '3条'].forEach(function (lb, i) {
      chip(nr, lb, settings.npcCount === i, function () {
        settings.npcCount = i;
        saveCfg(); renderSettings();
      });
    });
    var dr = document.getElementById('npcDiffRow');
    dr.innerHTML = '';
    DIFFS.forEach(function (df, i) {
      chip(dr, df.name, settings.npcDiff === i, function () {
        settings.npcDiff = i;
        saveCfg(); renderSettings();
      });
    });
  }

  function reset() {
    var cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    snake = [{x: cx, y: cy}, {x: cx - 1, y: cy}, {x: cx - 2, y: cy}];
    dir = {x: 1, y: 0}; nextDir = {x: 1, y: 0};
    prevSnake = null;
    score = 0; interval = BASE_INTERVAL;
    golds = []; slow = null; shrink = null; powerItem = null; fxThick = 0; fxStar = 0;
    enemies = []; foodCount = 0; parts = []; flash = 0;
    food = spawn();
    updateScore();
  }

  function occupied(x, y) {
    var i, j;
    for (i = 0; i < snake.length; i++) if (snake[i].x === x && snake[i].y === y) return true;
    for (i = 0; i < enemies.length; i++)
      for (j = 0; j < enemies[i].body.length; j++)
        if (enemies[i].body[j].x === x && enemies[i].body[j].y === y) return true;
    if (food && food.x === x && food.y === y) return true;
    for (i = 0; i < golds.length; i++) if (golds[i].x === x && golds[i].y === y) return true;
    if (slow && slow.x === x && slow.y === y) return true;
    if (shrink && shrink.x === x && shrink.y === y) return true;
    if (powerItem && powerItem.x === x && powerItem.y === y) return true;
    return false;
  }

  function spawn() {
    var x, y, tries = 0;
    do {
      x = Math.floor(Math.random() * COLS);
      y = Math.floor(Math.random() * ROWS);
      tries++;
    } while (occupied(x, y) && tries < 500);
    return {x: x, y: y};
  }

  function maybeSpawnSpecial() {
    var r = Math.random();
    if (golds.length === 0 && r < GOLD_CHANCE) {
      var g = spawn();
      g.until = Date.now() + GOLD_LIFETIME;
      golds.push(g);
    } else if (settings.items.slow && !slow && r < GOLD_CHANCE + SLOW_CHANCE && interval < BASE_INTERVAL - 20) {
      slow = spawn();
    } else if (settings.items.shrink && !shrink && r < GOLD_CHANCE + SLOW_CHANCE + SHRINK_CHANCE && snake.length >= 8) {
      shrink = spawn();
    } else if ((settings.items.thick || settings.items.star) && !powerItem && r < GOLD_CHANCE + SLOW_CHANCE + SHRINK_CHANCE + POWER_CHANCE) {
      var p = spawn();
      var types = [];
      if (settings.items.thick) types.push('thick');
      if (settings.items.star) types.push('star');
      powerItem = {x: p.x, y: p.y, type: types[Math.floor(Math.random() * types.length)]};
    }
  }

  var lastShownScore = -1;
  function updateScore() {
    var el = document.getElementById('score');
    if (score !== lastShownScore) {
      el.textContent = score;
      if (score > 0) {
        el.classList.add('pop');
        setTimeout(function () { el.classList.remove('pop'); }, 130);
      }
      lastShownScore = score;
    }
    document.getElementById('highscore').textContent = highscore;
  }

  // ---------- 头部碰撞区（N×N） ----------
  function headArea(pos, s) {
    var cells = [], b = Math.floor((s - 1) / 2), bx = pos.x - b, by = pos.y - b;
    for (var i = 0; i < s; i++)
      for (var j = 0; j < s; j++)
        cells.push({x: bx + i, y: by + j});
    return cells;
  }
  function inArea(cells, p) {
    for (var i = 0; i < cells.length; i++)
      if (cells[i].x === p.x && cells[i].y === p.y) return true;
    return false;
  }

  // ---------- 干扰小蛇 ----------
  function spawnEnemy() {
    if (enemies.length >= settings.npcCount) return;
    var dirs = [{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
    for (var t = 0; t < 100; t++) {
      var d = dirs[Math.floor(Math.random() * 4)];
      var hx = 2 + Math.floor(Math.random() * (COLS - 4));
      var hy = 2 + Math.floor(Math.random() * (ROWS - 4));
      if (Math.abs(hx - snake[0].x) + Math.abs(hy - snake[0].y) < 7) continue;
      var body = [], ok = true;
      for (var i = 0; i < 3; i++) {
        var c = {x: hx - d.x * i, y: hy - d.y * i};
        if (c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS || occupied(c.x, c.y)) { ok = false; break; }
        body.push(c);
      }
      if (!ok) continue;
      enemies.push({body: body, dir: d, until: Date.now() + DIFFS[settings.npcDiff].life});
      return;
    }
  }

  function enemySafe(e, d) {
    var nx = e.body[0].x + d.x, ny = e.body[0].y + d.y;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
    for (var i = 0; i < e.body.length - 1; i++)
      if (e.body[i].x === nx && e.body[i].y === ny) return false;
    return true;
  }

  function moveEnemy(e) {
    e.prev = e.body.slice();
    var nd = e.dir;
    var dirs = [{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
    if (Math.random() < DIFFS[settings.npcDiff].chase) {
      // 追踪 AI：选择靠近玩家蛇头的安全方向
      var best = null, bd = 1e9;
      for (var c = 0; c < 4; c++) {
        var dc = dirs[c];
        if (dc.x === -e.dir.x && dc.y === -e.dir.y) continue;
        if (!enemySafe(e, dc)) continue;
        var dist = Math.abs(e.body[0].x + dc.x - snake[0].x) + Math.abs(e.body[0].y + dc.y - snake[0].y);
        if (dist < bd) { bd = dist; best = dc; }
      }
      if (best) nd = best;
    } else if (Math.random() < 0.12 || !enemySafe(e, nd)) {
      var opts = [];
      for (var i = 0; i < 4; i++) {
        var d = dirs[i];
        if (d.x === -e.dir.x && d.y === -e.dir.y) continue;
        if (enemySafe(e, d)) opts.push(d);
      }
      if (opts.length) nd = opts[Math.floor(Math.random() * opts.length)];
    }
    if (!enemySafe(e, nd)) return; // 死路，原地等待
    e.dir = nd;
    e.body.unshift({x: e.body[0].x + nd.x, y: e.body[0].y + nd.y});
    e.body.pop();
    // 对手蛇抢道具（不吃豆子）
    var hd = e.body[0];
    if (slow && slow.x === hd.x && slow.y === hd.y) slow = null;
    if (shrink && shrink.x === hd.x && shrink.y === hd.y) shrink = null;
    if (powerItem && powerItem.x === hd.x && powerItem.y === hd.y) powerItem = null;
  }

  // ---------- 主循环 ----------
  var lastStep = 0, rafId = null;
  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (state === 'playing') {
      if (!lastStep) lastStep = ts;
      if (ts - lastStep >= interval) {
        lastStep = ts;
        step();
      }
    }
    draw(ts);
  }

  function step() {
    dir = nextDir;
    prevSnake = snake.slice();
    var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    var now = Date.now();
    // 强化效果到期恢复
    if (fxThick && now > fxThick) { fxThick = 0; sfx.headOff(); }
    if (fxStar && now > fxStar) { fxStar = 0; sfx.headOff(); }
    // 无敌：穿墙
    if (fxStar) {
      head.x = (head.x + COLS) % COLS;
      head.y = (head.y + ROWS) % ROWS;
    }
    var ps = fxThick ? 3 : 1;
    var area = headArea(head, ps);

    if (!fxStar) {
      // 撞墙：碰撞区任何一格出界即死（变粗时为3×3）
      for (var w = 0; w < area.length; w++) {
        var c = area[w];
        if (c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS) return gameOver();
      }
      // 撞自己：变粗时跳过颈部附近节段，避免误判
      var skip = ps === 1 ? 0 : 6;
      for (var i = 0; i < snake.length - 1; i++) {
        if (i < skip) continue;
        if (inArea(area, snake[i])) return gameOver();
      }
    }

    snake.unshift(head);
    var grew = false;

    // 吃豆子/道具：整个头部碰撞区都算
    if (food && inArea(area, food)) {
      score += 1; grew = true; sfx.eat();
      confettiAt(food);
      interval = Math.max(MIN_INTERVAL, interval - SPEEDUP_PER_FOOD);
      foodCount++;
      food = spawn();
      maybeSpawnSpecial();
      if (settings.npcCount > 0) {
        if (foodCount === 2) spawnEnemy();
        else if (foodCount > 2 && Math.random() < DIFFS[settings.npcDiff].spawn) spawnEnemy();
      }
    }
    for (var gi2 = golds.length - 1; gi2 >= 0; gi2--) {
      if (inArea(area, golds[gi2])) {
        score += 5; grew = true; sfx.gold();
        goldBlast(golds[gi2]);
        golds.splice(gi2, 1);
      } else if (now > golds[gi2].until) {
        golds.splice(gi2, 1);
      }
    }
    if (slow && inArea(area, slow)) {
      grew = true; sfx.slow();
      interval = Math.min(BASE_INTERVAL, interval + SLOW_AMOUNT);
      slow = null;
    }
    if (shrink && inArea(area, shrink)) {
      grew = true; sfx.shrink();
      var cut = Math.min(SHRINK_AMOUNT, snake.length - MIN_LEN);
      if (cut > 0) snake.splice(snake.length - cut, cut);
      shrink = null;
    }
    if (powerItem && inArea(area, powerItem)) {
      grew = true; sfx.head();
      if (powerItem.type === 'thick') fxThick = now + POWER_DURATION;
      else fxStar = now + POWER_DURATION;
      powerItem = null;
    }

    if (!grew) snake.pop();

    // 对手蛇：到期消失 + 移动
    for (var e2 = enemies.length - 1; e2 >= 0; e2--) {
      if (now > enemies[e2].until) { enemies.splice(e2, 1); continue; }
      moveEnemy(enemies[e2]);
    }

    // 与对手蛇的攻防判定
    var ps2 = fxThick ? 3 : 1;
    var area2 = headArea(snake[0], ps2);
    for (var e3 = enemies.length - 1; e3 >= 0; e3--) {
      var en = enemies[e3];
      if (fxStar) {
        // 无敌：碰到对手任何部位直接咬死它
        for (var q0 = 0; q0 < en.body.length; q0++)
          if (inArea(area2, en.body[q0])) { killEnemy(e3); break; }
        continue;
      }
      // 头对头相撞 → 失败
      if (inArea(area2, en.body[0])) return gameOver();
      // 对手咬到我的身体 → 失败
      for (var q1 = 1; q1 < snake.length; q1++)
        if (en.body[0].x === snake[q1].x && en.body[0].y === snake[q1].y) return gameOver();
      // 我咬到对手的蛇身 → 对手变成金豆
      for (var q2 = 1; q2 < en.body.length; q2++)
        if (inArea(area2, en.body[q2])) { killEnemy(e3); break; }
    }

    updateScore();
  }

  function killEnemy(idx) {
    var en = enemies[idx];
    for (var i = 0; i < en.body.length; i++)
      golds.push({x: en.body[i].x, y: en.body[i].y, until: Date.now() + GOLD_DROP_LIFE});
    confettiAt(en.body[0]);
    sfx.gold();
    enemies.splice(idx, 1);
  }

  function gameOver() {
    state = 'over';
    stopMusic();
    sfx.die();
    if (navigator.vibrate) { try { navigator.vibrate(200); } catch (e) {} }
    var prevHS = highscore;
    var isRecord = score > highscore;
    if (isRecord) {
      highscore = score;
      try { localStorage.setItem('snake_hs', String(highscore)); } catch (e) {}
    }
    var newSkins = [];
    for (var k = 0; k < SKINS.length; k++)
      if (SKINS[k].need > prevHS && SKINS[k].need <= highscore) newSkins.push(SKINS[k].name);
    var um = document.getElementById('unlockMsg');
    um.classList.toggle('hidden', newSkins.length === 0);
    um.textContent = newSkins.length ? '✨ 解锁新皮肤：' + newSkins.join('、') : '';
    renderSkins();
    updateScore();
    document.getElementById('finalScore').textContent = score;
    document.getElementById('newRecord').classList.toggle('hidden', !isRecord);
    document.getElementById('overBest').textContent = '最高分：' + highscore;
    document.getElementById('overScreen').classList.remove('hidden');
  }

  // ---------- 绘制 ----------
  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawEmojiHead(pos, size, emoji, alpha) {
    var b = Math.floor((size - 1) / 2);
    var cxp = (pos.x - b + size / 2) * cell;
    var cyp = (pos.y - b + size / 2) * cell;
    ctx.globalAlpha = alpha;
    // 碰撞区淡框
    ctx.strokeStyle = 'rgba(255,255,255,0.28)';
    ctx.lineWidth = 1;
    ctx.strokeRect((pos.x - b) * cell, (pos.y - b) * cell, size * cell, size * cell);
    ctx.font = Math.floor(cell * size * 0.95) + EMOJI_FONT;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(emoji, cxp, cyp + cell * 0.05 * size);
    ctx.globalAlpha = 1;
  }

  // 平滑插值：段从上一步位置滑向当前位置
  function ipos(cur, prev, f) {
    if (!prev) return cur;
    var dx = cur.x - prev.x, dy = cur.y - prev.y;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) return cur; // 穿墙瞬移不插值
    return {x: prev.x + dx * f, y: prev.y + dy * f};
  }

  function draw(ts) {
    if (!cell) return;
    var now = Date.now();
    var dt = lastDraw ? Math.min(0.05, (now - lastDraw) / 1000) : 0.016;
    lastDraw = now;
    var frac = 1;
    if (state === 'playing' && ts && lastStep) frac = Math.max(0, Math.min(1, (ts - lastStep) / interval));

    ctx.clearRect(0, 0, boardW, boardH);

    // 渐变棋盘背景 + 细网格 + 暗角
    var bg = ctx.createLinearGradient(0, 0, 0, boardH);
    bg.addColorStop(0, curSkin().board);
    bg.addColorStop(1, '#05070f');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, boardW, boardH);
    ctx.strokeStyle = 'rgba(255,255,255,0.045)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var glx = 1; glx < COLS; glx++) { ctx.moveTo(glx * cell, 0); ctx.lineTo(glx * cell, boardH); }
    for (var gly = 1; gly < ROWS; gly++) { ctx.moveTo(0, gly * cell); ctx.lineTo(boardW, gly * cell); }
    ctx.stroke();
    var vg = ctx.createRadialGradient(boardW / 2, boardH / 2, Math.min(boardW, boardH) * 0.45, boardW / 2, boardH / 2, Math.max(boardW, boardH) * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, boardW, boardH);

    if (!snake) return;
    var pad = Math.max(1, cell * 0.08);

    // 豆子与道具
    drawFood(food, '#e94560');
    for (var gi = 0; gi < golds.length; gi++) {
      var blink = golds[gi].until - now < 2000 && Math.floor(now / 200) % 2 === 0;
      if (!blink) drawFood(golds[gi], '#ffd460', true);
    }
    if (slow) drawFood(slow, '#7f7fff');
    if (shrink) drawFood(shrink, '#ff9f45', true);
    if (powerItem) {
      var pcx = powerItem.x * cell + cell / 2, pcy = powerItem.y * cell + cell / 2;
      var pr = cell * (0.7 + Math.sin(now / 200) * 0.1);
      var pg = ctx.createRadialGradient(pcx, pcy, pr * 0.2, pcx, pcy, pr);
      pg.addColorStop(0, powerItem.type === 'thick' ? 'rgba(255,120,120,0.5)' : 'rgba(255,220,110,0.55)');
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(pcx, pcy, pr, 0, Math.PI * 2); ctx.fill();
      ctx.font = Math.floor(cell * 0.85) + EMOJI_FONT;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(powerItem.type === 'thick' ? '🍄' : '⭐', pcx, pcy + cell * 0.05);
    }

    // 干扰小蛇
    for (var e = 0; e < enemies.length; e++) {
      var en = enemies[e];
      var fading = en.until - now < 2000 && Math.floor(now / 200) % 2 === 0;
      ctx.globalAlpha = fading ? 0.35 : 1;
      for (var j = en.body.length - 1; j >= 0; j--) {
        var epos = ipos(en.body[j], en.prev ? en.prev[j] : null, frac);
        ctx.fillStyle = j === 0 ? '#e58296' : '#c05a6e';
        rr(epos.x * cell + pad, epos.y * cell + pad, cell - pad * 2, cell - pad * 2, cell * 0.25);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // 主角蛇（按皮肤风格渲染；变粗时加大；平滑插值移动）
    var sk = curSkin();
    var padP = fxThick ? -cell * 0.15 : pad;
    for (var i = snake.length - 1; i >= 0; i--) {
      var spos = ipos(snake[i], prevSnake ? prevSnake[i] : null, frac);
      drawSeg(spos.x, spos.y, i === 0, i / snake.length, sk, padP);
    }

    var h = ipos(snake[0], prevSnake ? prevSnake[0] : null, frac);
    // 变粗：显示 3×3 碰撞框（快结束时闪烁）
    if (fxThick) {
      var bl = fxThick - now < 2000 && Math.floor(now / 200) % 2 === 0;
      if (!bl) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect((h.x - 1) * cell, (h.y - 1) * cell, cell * 3, cell * 3);
      }
    }
    // 无敌：金色光环 + 火花
    if (fxStar) {
      var bl2 = fxStar - now < 2000 && Math.floor(now / 200) % 2 === 0;
      if (!bl2) {
        ctx.strokeStyle = 'rgba(255,212,96,0.8)';
        ctx.lineWidth = Math.max(2, cell * 0.12);
        ctx.beginPath();
        ctx.arc(h.x * cell + cell / 2, h.y * cell + cell / 2, cell * 0.95, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (Math.random() < 0.4)
        parts.push({x: h.x * cell + cell / 2, y: h.y * cell + cell / 2, vx: (Math.random() - 0.5) * cell * 3, vy: (Math.random() - 0.5) * cell * 3, life: 0.6, dec: 1.5, c: '#ffd460', s: 2 + Math.random() * 2});
    }
    // 蛇眼睛
    ctx.fillStyle = '#1a1a2e';
    var ex = h.x * cell + cell / 2, ey = h.y * cell + cell / 2;
    var off = cell * 0.18, r = Math.max(1.5, cell * 0.07);
    var px = dir.y !== 0 ? off : 0, py = dir.x !== 0 ? off : 0;
    var fx = dir.x * cell * 0.12, fy = dir.y * cell * 0.12;
    ctx.beginPath(); ctx.arc(ex - px + fx, ey - py + fy, r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + px + fx, ey + py + fy, r, 0, Math.PI * 2); ctx.fill();

    // 粒子特效
    for (var p = parts.length - 1; p >= 0; p--) {
      var pt = parts[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vy += cell * 9 * dt;
      pt.life -= pt.dec * dt;
      if (pt.life <= 0) { parts.splice(p, 1); continue; }
      ctx.globalAlpha = Math.max(0, pt.life);
      ctx.fillStyle = pt.c;
      ctx.fillRect(pt.x - pt.s / 2, pt.y - pt.s / 2, pt.s, pt.s);
    }
    ctx.globalAlpha = 1;

    // 金豆子全屏闪光
    if (flash > 0) {
      ctx.fillStyle = 'rgba(255,255,240,' + (flash * 0.6).toFixed(3) + ')';
      ctx.fillRect(0, 0, boardW, boardH);
      flash -= 2.2 * dt;
    }
  }

  // ---------- 皮肤渲染风格 ----------
  function segColor(sk, t) {
    return 'rgb(' + lerpc(sk.body1[0], sk.body2[0], t) + ',' + lerpc(sk.body1[1], sk.body2[1], t) + ',' + lerpc(sk.body1[2], sk.body2[2], t) + ')';
  }
  function hexPath(cx, cy, r) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 3 * i - Math.PI / 6;
      var px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }
  function drawSeg(gx, gy, isHead, t, sk, pad) {
    var x = gx * cell, y = gy * cell;
    var cx = x + cell / 2, cy = y + cell / 2;
    var rad = cell / 2 - pad;
    var base = isHead ? sk.head : segColor(sk, t);
    switch (sk.style) {
      case 'sphere': // 3D 果冻球：径向渐变高光
        var g = ctx.createRadialGradient(cx - rad * 0.35, cy - rad * 0.35, rad * 0.15, cx, cy, rad);
        g.addColorStop(0, 'rgba(255,255,255,0.9)');
        g.addColorStop(0.25, base);
        g.addColorStop(1, segColor(sk, Math.min(1, t + 0.35)));
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2); ctx.fill();
        break;
      case 'neon': // 霓虹：外发光 + 亮环
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = base;
        ctx.beginPath(); ctx.arc(cx, cy, rad + pad * 2, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0d1117';
        ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = base;
        ctx.lineWidth = Math.max(1.5, cell * 0.09);
        ctx.beginPath(); ctx.arc(cx, cy, rad - ctx.lineWidth / 2, 0, Math.PI * 2); ctx.stroke();
        break;
      case 'scale': // 龙鳞：六边形鳞片 + 上亮下暗
        var g2 = ctx.createLinearGradient(x, y, x, y + cell);
        g2.addColorStop(0, 'rgba(255,255,255,0.35)');
        g2.addColorStop(0.3, base);
        g2.addColorStop(1, segColor(sk, Math.min(1, t + 0.4)));
        ctx.fillStyle = g2;
        hexPath(cx, cy, rad);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 1;
        ctx.stroke();
        break;
      case 'gold': // 黄金3D：金属渐变 + 高光点
        var g3 = ctx.createLinearGradient(x, y, x + cell, y + cell);
        g3.addColorStop(0, '#fff8d0');
        g3.addColorStop(0.4, base);
        g3.addColorStop(1, segColor(sk, Math.min(1, t + 0.45)));
        ctx.fillStyle = g3;
        rr(x + pad, y + pad, cell - pad * 2, cell - pad * 2, cell * 0.3);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(cx - rad * 0.4, cy - rad * 0.4, Math.max(1, cell * 0.08), 0, Math.PI * 2); ctx.fill();
        break;
      default: // 经典扁平
        ctx.fillStyle = base;
        rr(x + pad, y + pad, cell - pad * 2, cell - pad * 2, cell * 0.25);
        ctx.fill();
    }
  }

  function drawFood(f, color, star) {
    if (!f) return;
    var cx = f.x * cell + cell / 2, cy = f.y * cell + cell / 2;
    var pulse = 1 + Math.sin(Date.now() / 220 + f.x * 3 + f.y) * 0.12;
    var rad = cell * 0.33 * pulse;
    // 外发光
    var glow = ctx.createRadialGradient(cx, cy, rad * 0.3, cx, cy, rad * 2.2);
    glow.addColorStop(0, color);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, rad * 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // 本体：带高光的立体球
    var g = ctx.createRadialGradient(cx - rad * 0.35, cy - rad * 0.35, rad * 0.1, cx, cy, rad);
    g.addColorStop(0, 'rgba(255,255,255,0.95)');
    g.addColorStop(0.3, color);
    g.addColorStop(1, color);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2); ctx.fill();
    if (star) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(cx - rad * 0.3, cy - rad * 0.3, rad * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ---------- 触摸滑动控制 ----------
  var touchX = null, touchY = null;
  document.addEventListener('touchstart', function (e) {
    var t = e.touches[0];
    touchX = t.clientX; touchY = t.clientY;
  }, {passive: false});

  document.addEventListener('touchmove', function (e) {
    e.preventDefault(); // 阻止页面滚动/下拉刷新
    if (touchX === null || state !== 'playing') return;
    var t = e.touches[0];
    var dx = t.clientX - touchX, dy = t.clientY - touchY;
    var TH = 24; // 滑动触发阈值
    if (Math.abs(dx) < TH && Math.abs(dy) < TH) return;
    var nd;
    if (Math.abs(dx) > Math.abs(dy)) nd = {x: dx > 0 ? 1 : -1, y: 0};
    else nd = {x: 0, y: dy > 0 ? 1 : -1};
    // 禁止直接反向
    if (nd.x !== -dir.x || nd.y !== -dir.y) {
      if (nd.x !== nextDir.x || nd.y !== nextDir.y) sfx.turn();
      nextDir = nd;
    }
    touchX = t.clientX; touchY = t.clientY; // 支持连续滑动多次转向
  }, {passive: false});

  document.addEventListener('touchend', function () { touchX = null; }, {passive: false});

  // ---------- 底部方向键 ----------
  function setDir(nd) {
    if (state !== 'playing') return;
    if (nd.x === -dir.x && nd.y === -dir.y) return; // 禁止直接反向
    if (nd.x !== nextDir.x || nd.y !== nextDir.y) sfx.turn();
    nextDir = nd;
  }
  var DMAP = {up: {x: 0, y: -1}, down: {x: 0, y: 1}, left: {x: -1, y: 0}, right: {x: 1, y: 0}};
  var dps = document.querySelectorAll('.dp');
  for (var di = 0; di < dps.length; di++) {
    (function (btn) {
      var ndd = DMAP[btn.getAttribute('data-d')];
      btn.addEventListener('touchstart', function (e) {
        e.preventDefault(); e.stopPropagation();
        initAudio(); setDir(ndd);
      }, {passive: false});
      btn.addEventListener('mousedown', function () { setDir(ndd); });
    })(dps[di]);
  }

  // 键盘（便于电脑上调试）
  document.addEventListener('keydown', function (e) {
    var map = {
      ArrowUp: {x: 0, y: -1}, ArrowDown: {x: 0, y: 1},
      ArrowLeft: {x: -1, y: 0}, ArrowRight: {x: 1, y: 0},
      w: {x: 0, y: -1}, s: {x: 0, y: 1}, a: {x: -1, y: 0}, d: {x: 1, y: 0}
    };
    if (e.key === ' ') { togglePause(); return; }
    var nd = map[e.key];
    if (nd && state === 'playing' && (nd.x !== -dir.x || nd.y !== -dir.y)) nextDir = nd;
  });

  // ---------- 界面按钮 ----------
  function show(id, on) { document.getElementById(id).classList.toggle('hidden', !on); }

  // 同时监听 touchend 和 click，兼容老版 WebView 点击失灵
  function tap(el, fn) {
    var fired = 0;
    el.addEventListener('touchend', function (e) {
      e.preventDefault(); e.stopPropagation();
      fired = Date.now(); fn();
    });
    el.addEventListener('click', function () {
      if (Date.now() - fired > 500) fn();
    });
  }

  function startGame() {
    initAudio();
    reset();
    state = 'playing';
    lastStep = 0;
    startMusic();
    show('startScreen', false); show('overScreen', false); show('pauseScreen', false);
  }

  function togglePause() {
    if (state === 'playing') {
      state = 'paused';
      show('pauseScreen', true);
      document.getElementById('pauseBtn').textContent = '▶';
    } else if (state === 'paused') {
      state = 'playing';
      lastStep = 0;
      show('pauseScreen', false);
      document.getElementById('pauseBtn').textContent = '❚❚';
    }
  }

  tap(document.getElementById('startBtn'), startGame);
  tap(document.getElementById('menuBtn'), function () {
    show('overScreen', false);
    show('startScreen', true);
    state = 'start';
  });
  tap(document.getElementById('restartBtn'), startGame);
  tap(document.getElementById('resumeBtn'), togglePause);
  tap(document.getElementById('pauseBtn'), function () {
    initAudio();
    togglePause();
  });

  // 切到后台自动暂停
  document.addEventListener('visibilitychange', function () {
    if (document.hidden && state === 'playing') togglePause();
  });

  // ---------- 启动 ----------
  resize();
  reset();
  renderSkins();
  renderSettings();
  state = 'start';
  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
