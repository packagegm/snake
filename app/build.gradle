plugins {
    id 'com.android.application'
}

android {
    namespace 'com.gavin.snake'
    compileSdk 34

    defaultConfig {
        applicationId "com.gavin.snake"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            if (file('snake.jks').exists()) {
                storeFile file('snake.jks')
                storePassword System.getenv('KEYSTORE_PASSWORD')
                keyAlias 'snake'
                keyPassword System.getenv('KEYSTORE_PASSWORD')
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            if (file('snake.jks').exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
