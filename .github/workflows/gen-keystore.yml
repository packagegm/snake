name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 生成签名密钥库并导出 base64
        env:
          PW: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$PW" ]; then
            echo "错误：请先在仓库 Settings → Secrets and variables → Actions 中添加 KEYSTORE_PASSWORD"
            exit 1
          fi
          keytool -genkeypair -v -keystore snake.jks -alias snake \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass "$PW" -keypass "$PW" \
            -dname "CN=Snake, OU=Game, O=Gavin, L=Beijing, S=Beijing, C=CN"
          base64 -w0 snake.jks > snake-jks-base64.txt

      - name: 上传密钥库（请下载后妥善备份，勿提交到仓库）
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: |
            snake.jks
            snake-jks-base64.txt
